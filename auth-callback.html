<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Lokahi...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 32px;
            font-size: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fallback {
            margin-top: 24px;
            font-size: 14px;
            color: #999;
            display: none;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌺</div>
        <h1>Opening Lokahi...</h1>
        <p id="message">Redirecting you to the app</p>
        <div class="spinner"></div>
        <p class="fallback" id="fallback">
            If the app didn't open automatically, please open the Lokahi app manually.
        </p>
    </div>

    <script>
        // Extract auth hash and query params from URL
        const hash = window.location.hash;
        const search = window.location.search;

        // Construct deep link with all auth data
        const deepLink = `lokahi://auth-callback${search}${hash}`;

        console.log('Supabase auth callback - redirecting to:', deepLink);

        // Attempt redirect
        window.location.href = deepLink;

        // Show fallback message after 2 seconds
        setTimeout(() => {
            document.getElementById('fallback').style.display = 'block';
            document.getElementById('message').textContent = 'Authentication successful!';
        }, 2000);

        // For iOS - try opening in a hidden iframe as fallback
        setTimeout(() => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deepLink;
            document.body.appendChild(iframe);
        }, 100);
    </script>
</body>
</html>
