<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Lokahi...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 24px;
            font-size: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .open-app-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            transition: transform 0.1s;
        }
        .open-app-btn:active {
            transform: scale(0.98);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌺</div>
        <h1 id="title">Opening Lokahi...</h1>
        <p id="message">Attempting to open the app</p>
        <div class="spinner" id="spinner"></div>
        <a href="#" class="open-app-btn hidden" id="openAppBtn">Open Lokahi App</a>
    </div>

    <script>
        // Extract auth hash and query params from URL
        const hash = window.location.hash;
        const search = window.location.search;

        // Construct deep link with all auth data
        const deepLink = `lokahi://auth-callback${search}${hash}`;

        console.log('Supabase auth callback - deep link:', deepLink);

        const spinner = document.getElementById('spinner');
        const openAppBtn = document.getElementById('openAppBtn');
        const message = document.getElementById('message');
        const title = document.getElementById('title');

        // Set up button click handler
        openAppBtn.href = deepLink;
        openAppBtn.onclick = (e) => {
            e.preventDefault();
            window.location.href = deepLink;
            message.textContent = 'Opening app...';
        };

        // Try automatic redirect first
        let attemptCount = 0;
        function attemptRedirect() {
            if (attemptCount < 2) {
                attemptCount++;
                console.log('Attempting redirect', attemptCount);
                window.location.href = deepLink;
            }
        }

        // First attempt immediately
        attemptRedirect();

        // Second attempt after 500ms
        setTimeout(attemptRedirect, 500);

        // After 2 seconds, show manual button
        setTimeout(() => {
            spinner.classList.add('hidden');
            openAppBtn.classList.remove('hidden');
            title.textContent = 'Almost there!';
            message.textContent = 'Tap the button below to open Lokahi';
        }, 2000);

        // iOS fallback - try iframe
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            setTimeout(() => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = deepLink;
                document.body.appendChild(iframe);
            }, 100);
        }
    </script>
</body>
</html>
