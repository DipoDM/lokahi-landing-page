<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Lōkahi...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 1s infinite;
        }

        .logo svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .countdown {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }

        .app-buttons {
            display: none;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .app-buttons.show {
            display: flex;
        }

        .app-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 30px;
            background: #000;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }

        .app-button:hover {
            transform: translateY(-2px);
            background: #333;
        }

        .app-button img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }

        .retry-button {
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            display: none;
        }

        .retry-button.show {
            display: inline-block;
        }

        .retry-button:hover {
            text-decoration: underline;
        }

        .event-id {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/>
            </svg>
        </div>

        <h1>Opening Lōkahi...</h1>
        <p>Redirecting you to the app to view this event</p>

        <div id="countdown" class="countdown">Redirecting in 3...</div>

        <div id="appButtons" class="app-buttons">
            <p style="color: #666; margin-bottom: 10px;">Don't have the app yet?</p>
            <a href="https://apps.apple.com/app/your-app-id" class="app-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                </svg>
                Download on App Store
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.mofakolabs.ohana" class="app-button">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                Get it on Google Play
            </a>
            <a href="#" id="retryButton" class="retry-button">Try opening in app again</a>
        </div>

        <div class="event-id">
            <span id="eventIdDisplay"></span>
        </div>
    </div>

    <script>
        // Get event ID from URL path
        function getEventId() {
            const path = window.location.pathname;
            const match = path.match(/\/event\/([^\/]+)/);
            return match ? match[1] : null;
        }

        const eventId = getEventId();
        const appUrl = `lokahi://event/${eventId}`;

        // Display event ID
        if (eventId) {
            document.getElementById('eventIdDisplay').textContent = `Event ID: ${eventId}`;
        }

        // Try to open the app immediately
        window.location.href = appUrl;

        // Countdown timer
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        const appButtons = document.getElementById('appButtons');
        const retryButton = document.getElementById('retryButton');

        const timer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                countdownElement.textContent = `Redirecting in ${countdown}...`;
            } else {
                clearInterval(timer);
                countdownElement.style.display = 'none';
                appButtons.classList.add('show');
                retryButton.classList.add('show');
            }
        }, 1000);

        // Retry button
        retryButton.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = appUrl;
        });
    </script>
</body>
</html>
